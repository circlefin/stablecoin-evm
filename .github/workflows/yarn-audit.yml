name: Yarn audit

on:
  pull_request:
    paths:
      - "package.json"
      - "yarn.lock"
      - ".github/workflows/yarn-audit.yml"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: yarn install --immutable
      - run: yarn audit --level high
