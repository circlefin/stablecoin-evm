services:
  injective-localnet:
    image: injectivelabs/injective-core:v1.17.2-usdc
    container_name: injective-localnet
    ports:
      - "26657:26657" # Tendermint RPC
      - "9090:9090" # gRPC
      - "8545:8545" # Ethereum JSON-RPC
      - "10337:10337" # REST API
    volumes:
      - ./scripts/injective/init-and-start.sh:/init-and-start.sh:ro
    entrypoint: ["/bin/bash", "/init-and-start.sh"]
