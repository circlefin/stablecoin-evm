name: Node matrix tests

on:
  pull_request:
    paths:
      - "package.json"
      - "yarn.lock"
      - "hardhat.config.*"
      - "**/*.ts"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: yarn install --immutable
      - run: yarn test
